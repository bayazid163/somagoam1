version: '3.8'

services:
  somagom-dev:
    image: node:20-alpine
    container_name: somagom-dev-container
    working_dir: /app
    ports:
      - "3000:5173"
    volumes:
      - .:/app
    environment:
      - WATCHPACK_POLLING=true
    # Fixed command to ensure it runs correctly every time
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

networks:
  default:
    name: somagom_network
    driver: bridge